<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PI ARCADE NEXUS</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background-color: #0d0d1f; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .game-btn { background: #5b21b6; padding: 15px; border-radius: 8px; cursor: pointer; border: 1px solid #7c3aed; }
        #game-frame { width: 100%; height: 500px; border: 2px solid #7c3aed; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <h1>🎮 PI ARCADE NEXUS</h1>
    <div id="status">Connecte-toi pour jouer.</div>
    <button onclick="authPiUser()">Se connecter avec Pi</button>

    <div class="game-grid">
        <div class="game-btn" onclick="lancerJeu('https://gabrielecirulli.github.io/2048/')">2048</div>
        <div class="game-btn" onclick="lancerJeu('https://binaryjs.com/project/pacman/')">Pac-Man</div>
        <div class="game-btn" onclick="lancerJeu('https://ellisonleao.github.io/clumsy-bird/')">Flappy Bird</div>
        <div class="game-btn" onclick="lancerJeu('https://tholman.com/tetris/')">Tetris</div>
    </div>

    <iframe id="game-frame"></iframe>

    <script>
        // Initialisation SDK
        Pi.init({ version: "2.0", sandbox: true });

        async function authPiUser() {
            const user = await Pi.authenticate(['username'], () => {});
            document.getElementById('status').innerText = `Bienvenue, ${user.username} !`;
        }

        function lancerJeu(url) {
            const frame = document.getElementById('game-frame');
            frame.src = url;
            frame.style.display = 'block';
        }
    </script>
</body>
</html>
