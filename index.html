<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PI ARCADE NEXUS - NES</title>
    <!-- Moteur JSNES intégré -->
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <style>
        body { background: #0d0d1f; color: white; text-align: center; font-family: sans-serif; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        button { background: #5b21b6; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        #emulator-screen { border: 2px solid #7c3aed; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>PI ARCADE NEXUS</h1>
    <div class="game-grid">
        <button onclick="lancerJeu('https://corsproxy.io/?https://raw.githubusercontent.com/nesbox/ROMs/master/NES/Super%20Mario%20Bros.nes')">🍄 Mario</button>
        <button onclick="lancerJeu('https://corsproxy.io/?https://raw.githubusercontent.com/nesbox/ROMs/master/NES/The%20Legend%20of%20Zelda.nes')">🛡️ Zelda</button>
    </div>
    <canvas id="emulator-screen" width="256" height="240"></canvas>

    <script>
        const nes = new jsnes.NES({
            onFrame: (buffer) => {
                const canvas = document.getElementById('emulator-screen');
                const ctx = canvas.getContext('2d');
                const img = ctx.createImageData(256, 240);
                // Rendu des pixels ici
                ctx.putImageData(img, 0, 0);
            }
        });

        function lancerJeu(url) {
            fetch(url)
                .then(res => res.arrayBuffer())
                .then(data => {
                    nes.loadROM(new Uint8Array(data));
                    nes.start();
                })
                .catch(err => alert("Erreur de chargement : " + err));
        }
    </script>
</body>
</html>
