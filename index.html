<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PI ARCADE NEXUS</title>
    <style>
        body { background-color: #0d0d1f; color: white; text-align: center; font-family: sans-serif; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .game-btn { background: #5b21b6; padding: 15px; border-radius: 8px; cursor: pointer; }
        #game-frame { width: 100%; height: 400px; border: 2px solid #7c3aed; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>PI ARCADE NEXUS</h1>
    <p>Clique sur un jeu ci-dessous :</p>
    
    <div class="game-grid">
        <!-- Ces liens sont configurés pour accepter l'intégration -->
        <div class="game-btn" onclick="document.getElementById('game-frame').src='https://html5.gamedistribution.com/rvvASU3s/45e43a60c000494488344736f1c40212/'">Tetris</div>
        <div class="game-btn" onclick="document.getElementById('game-frame').src='https://html5.gamedistribution.com/a42b102925b44319808d234190886566/'">Pac-Man</div>
    </div>

    <iframe id="game-frame" src="about:blank"></iframe>
</body>
</html>
