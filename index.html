<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PI ARCADE NEXUS</title>
    <style>
        body { background-color: #0d0d1f; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 20px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; }
        .game-card { background:#1a1a2e; padding:20px; border-radius:10px; text-align:center; color:white; border:1px solid #7c3aed; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>PI ARCADE NEXUS</h1>
</header>

<!-- Section Jeux -->
<div class="game-grid">

    <!-- Super Mario Kart -->
    <div class="game-card" onclick="window.open('https://emulatorjs.com/play/?url=https://raw.githubusercontent.com/EmulatorJS/ROMs/main/Snes/Super%20Mario%20Kart%20(USA).sfc', '_blank')">
        <h3>Super Mario Kart</h3>
    </div>

    <!-- Donkey Kong Country -->
    <div class="game-card" onclick="window.open('https://emulatorjs.com/play/?url=https://raw.githubusercontent.com/EmulatorJS/ROMs/main/Snes/Donkey%20Kong%20Country%20(USA)%20(Rev%202).sfc', '_blank')">
        <h3>Donkey Kong Country</h3>
    </div>

    <!-- Mega Man 2 -->
    <div class="game-card" onclick="window.open('https://emulatorjs.com/play/?url=https://raw.githubusercontent.com/EmulatorJS/ROMs/main/Nes/Mega%20Man%202%20(USA).nes', '_blank')">
        <h3>Mega Man 2</h3>
    </div>

    <!-- Kirby's Adventure -->
    <div class="game-card" onclick="window.open('https://emulatorjs.com/play/?url=https://raw.githubusercontent.com/EmulatorJS/ROMs/main/Nes/Kirby%27s%20Adventure%20(USA).nes', '_blank')">
        <h3>Kirby's Adventure</h3>
    </div>

</div>

</body>
</html>
