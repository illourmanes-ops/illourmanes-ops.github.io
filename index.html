<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PI ARCADE NEXUS</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <style>
        body { 
            background-color: #0d0d1f; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            text-align: center;
        }
        header { 
            padding: 20px; 
            border-bottom: 2px solid #7c3aed; 
            background: #1a1a2e;
        }
        h1 { margin: 0; font-size: 28px; color: #fff; }
        
        #pi-login-btn {
            margin-top: 15px;
            padding: 12px 25px;
            background-color: #5b21b6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .game-box {
            margin: 30px auto;
            max-width: 400px;
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #7c3aed;
        }

        /* Intégration propre d'un mini-jeu Web natif (léger et sans blocage) */
        iframe {
            width: 100%;
            height: 450px;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 PI ARCADE NEXUS</h1>
        <button id="pi-login-btn" onclick="authPiUser()">Se connecter avec Pi</button>
        <p id="user-status" style="color: #a78bfa; margin-top: 10px;">Connecte ton compte pour jouer.</p>
    </header>

    <div class="game-box">
        <h3>Défi Quotidien</h3>
        <iframe src="https://gabrielecirulli.github.io/2048/"></iframe>
    </div>

    <script>
        // Initialisation du SDK Pi
        // (Pour les tests dans le Pi Browser, sandbox est à true, il faudra le mettre à false en production)
        window.onload = function() {
            try {
                Pi.init({ version: "2.0", sandbox: true });
            } catch(e) {
                console.error("Erreur d'initialisation du SDK Pi", e);
            }
        };

        // Fonction d'authentification de l'utilisateur Pi
        async function authPiUser() {
            try {
                const scopes = ['username', 'payments'];
                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                // Si la connexion réussie, on affiche le nom d'utilisateur
                document.getElementById('user-status').innerText = `Bienvenue, ${user.username} !`;
                document.getElementById('pi-login-btn').style.display = 'none'; // Cache le bouton une fois connecté
                
            } catch (err) {
                alert("Erreur lors de l'authentification : " + err);
            }
        }

        function onIncompletePaymentFound(payment) {
            // Gère les paiements en attente si l'utilisateur recharge la page en plein milieu d'une transaction Pi
            console.log("Paiement incomplet détecté :", payment);
        }
    </script>
</body>
</html>
